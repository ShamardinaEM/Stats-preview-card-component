<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <link
            rel="icon"
            type="image/png"
            sizes="32x32"
            href="./images/favicon-32x32.png"
        />
        <link rel="stylesheet" href="./styles/style.css" />
        <title>Frontend Mentor | Stats preview card component</title>
    </head>
    <body>
        <div class="wrapper">
            <div class="text-area">
                <h1>
                    Get <span class="highlight">insights</span> that help your
                    business grow.
                </h1>
                <p>
                    Discover the benefits of data analytics and make better
                    decisions regarding revenue, customer experience, and
                    overall efficiency.
                </p>
                <div class="grid">
                    <div class="grid-item">
                        <span class="grid-item-highlight">10k+</span> companies
                    </div>
                    <div class="grid-item">
                        <span class="grid-item-highlight">314</span> templates
                    </div>
                    <div class="grid-item">
                        <span class="grid-item-highlight">12m+</span> queries
                    </div>
                </div>
            </div>
            <div class="img-area"></div>
        </div>
        <footer class="attribution">
            Challenge by
            <a
                href="https://www.frontendmentor.io?ref=challenge"
                target="_blank"
                rel="noopener noreferrer"
                >Frontend Mentor</a
            >. Coded by
            <a
                href="https://github.com/ShamardinaEM"
                target="_blank"
                rel="noopener noreferrer"
                >ShamardinaEM</a
            >.
        </footer>
    </body>
</html>
